
server.port=8081
spring.application.name=tradesphere-identity-service

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/tradesphere_identity
spring.datasource.username=${POSTGRES_USER:tradesphere}
spring.datasource.password=${POSTGRES_PASSWORD:tradesphere}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2000ms

spring.kafka.bootstrap-servers=${KAFKA_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

jwt.secret=${JWT_SECRET:qSWa4k5MaM7aX3+Je4Q+lVnF8FMrRrj8r5eDcdnhTe8=}
jwt.access-token-expiry-ms=900000

management.endpoints.web.exposure.include=health,info

logging.level.com.tradesphere.identity=DEBUG
logging.level.org.flywaydb=DEBUG
