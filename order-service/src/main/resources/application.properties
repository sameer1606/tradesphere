# TradeSphere Order Service
# Port: 8084 | DB: Postgres (orders, trades, outbox)
# Most complex service state machine, Outbox, Feign, MIS scheduler

server.port=8084
spring.application.name=tradesphere-order-service

# PostgreSQL 
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/tradesphere_order
spring.datasource.username=${POSTGRES_USER:tradesphere}
spring.datasource.password=${POSTGRES_PASSWORD:tradesphere}
spring.datasource.driver-class-name=org.postgresql.Driver
# Slightly higher pool order placement is write-heavy
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=3

# JPA 
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway 
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
logging.level.org.flywaydb=DEBUG


# Redis 
# Used for: idempotency key guard + limit order watcher (price:tick subscription)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Kafka Producer (via Outbox relay) 
# Topics: order.executed · order.cancelled · order.rejected
spring.kafka.bootstrap-servers=${KAFKA_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
# Exactly-once semantics for order events critical for fund consistency
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.acks=all
spring.kafka.producer.properties.retries=3
spring.kafka.producer.properties.spring.json.add.type.headers=false

# -- WebClient --
client.account-service.base-url=http://localhost:8082
client.account-service.connect-timeout=3000
client.account-service.read-timeout=5000

# JWT 
jwt.secret=${JWT_SECRET:tradesphere-local-dev-secret-replace-before-any-real-use}

# Idempotency 
# Same X-Idempotency-Key within 24h returns the original order no duplicate
order.idempotency-ttl-seconds=86400

# Outbox Relay 
# Polls unpublished outbox_event rows and publishes to Kafka
outbox.relay-interval-ms=5000

# MIS Auto Square-Off 
# All open MIS positions force-closed at 15:20 IST mandatory by exchange rules
mis.squareoff-cron=0 20 15 * * MON-FRI
mis.timezone=Asia/Kolkata

# Redis Pub/Sub (Limit Order Watcher)
# LimitOrderWatcher subscribes to this pattern to match open limit orders
redis.pubsub.price-tick-channel-pattern=price:tick:*

# Actuator 
management.endpoints.web.exposure.include=health,info

# Logging 
logging.level.com.tradesphere.order=DEBUG

