# ─────────────────────────────────────────────────────────────────────────────
# TradeSphere — Portfolio Service
# Port: 8085 | DB: Postgres (holdings, positions, snapshots) + Redis (P&L cache)
#
# SOURCE OF TRUTH RULE — read this before touching any code:
#   Durable state (holdings, positions) comes from Kafka order.executed ONLY.
#   Redis = transient live P&L recalculation, NOT source of truth.
#   Postgres is NEVER written directly from price ticks.
#   Batch flush from Redis to Postgres every 60s via scheduler.
# ─────────────────────────────────────────────────────────────────────────────

server.port=8085
spring.application.name=tradesphere-portfolio-service

# ── PostgreSQL ────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/tradesphere_portfolio
spring.datasource.username=${POSTGRES_USER:tradesphere}
spring.datasource.password=${POSTGRES_PASSWORD:tradesphere}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── Redis ─────────────────────────────────────────────────────────────────────
# Used for: live P&L cache (pnl:{userId}:{symbol}) + price:tick:* subscription
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# ── Kafka Consumer ────────────────────────────────────────────────────────────
# Consumes order.executed → updates holdings (CNC) or positions (MIS)
spring.kafka.bootstrap-servers=${KAFKA_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=tradesphere-portfolio-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.tradesphere.*

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:tradesphere-local-dev-secret-replace-before-any-real-use}

# ── P&L Batch Flush ───────────────────────────────────────────────────────────
# How often to write live P&L from Redis → Postgres
# Never write on every tick — at 100 ticks/sec this would destroy Postgres
portfolio.pnl.batch-flush-interval-seconds=60

# ── Daily P&L Snapshot ────────────────────────────────────────────────────────
# Written after market close — drives historical P&L chart
portfolio.snapshot.cron=0 35 15 * * MON-FRI
portfolio.snapshot.timezone=Asia/Kolkata

# ── Redis Pub/Sub ─────────────────────────────────────────────────────────────
# PriceTickConsumer subscribes to recalculate live unrealised P&L
redis.pubsub.price-tick-channel-pattern=price:tick:*

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.tradesphere.portfolio=DEBUG
