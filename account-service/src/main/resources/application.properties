server.port=8082
spring.application.name=tradesphere-account-service

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/tradesphere_account
spring.datasource.username=${POSTGRES_USER:tradesphere}
spring.datasource.password=${POSTGRES_PASSWORD:tradesphere}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true


spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

spring.kafka.bootstrap-servers=${KAFKA_SERVERS:localhost:9092}

# Consumer funds module reacts to all 3 order lifecycle events
# order.executed  finalize reservation
# order.cancelled release reservation
# order.rejected release reservation (same as cancelled)
spring.kafka.consumer.group-id=tradesphere-account-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.tradesphere.*
spring.kafka.consumer.properties.spring.json.value.default.type=com.tradesphere.account.funds.event.OrderEvent

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

jwt.secret=${JWT_SECRET:tradesphere-local-dev-secret-replace-before-any-real-use}

# Internal Funds Endpoints (NOT exposed via Gateway)
# Order Service calls these via FundsClient Feign
# POST /internal/funds/reserve
# POST /internal/funds/release
# POST /internal/funds/credit
funds.internal.base-path=/internal/funds

management.endpoints.web.exposure.include=health,info

logging.level.com.tradesphere.account=DEBUG
logging.level.org.flywaydb=DEBUG
logging.level.org.springframework.security=TRACE