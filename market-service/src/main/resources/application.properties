# ─────────────────────────────────────────────────────────────────────────────
# TradeSphere — Market Service
# Port: 8083 | DB: Redis (price cache) + Postgres (OHLC candles)
# Does NOT publish to Kafka — price ticks go to Redis Pub/Sub only
# ─────────────────────────────────────────────────────────────────────────────

server.port=8083
spring.application.name=tradesphere-market-service

# ── PostgreSQL (OHLC candle storage) ──────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/tradesphere_market
spring.datasource.username=${POSTGRES_USER:tradesphere}
spring.datasource.password=${POSTGRES_PASSWORD:tradesphere}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── Redis ─────────────────────────────────────────────────────────────────────
# Used for: latest price cache (SET price:{sym} EX 30) + Pub/Sub publishing
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:tradesphere-local-dev-secret-replace-before-any-real-use}

# ── Provider Config ───────────────────────────────────────────────────────────
# MarketDataProvider interface allows swapping — change here only
market.provider=finnhub

# Finnhub — free tier: https://finnhub.io/register
finnhub.api-key=${FINNHUB_API_KEY:demo}
finnhub.websocket-url=wss://ws.finnhub.io
# Symbols to subscribe on startup (use NSE:INFY format for Indian stocks)
finnhub.symbols=AAPL,MSFT,TSLA,AMZN,GOOGL

# Twelve Data — used only for historical candle seeding on startup
twelvedata.api-key=${TWELVEDATA_API_KEY:demo}
twelvedata.base-url=https://api.twelvedata.com

# ── Redis Pub/Sub + Cache Config ──────────────────────────────────────────────
# Channel pattern: price:tick:{symbol}
redis.pubsub.price-tick-channel-prefix=price:tick:
# TTL for latest price — if Finnhub disconnects, key expires → stale detection
redis.cache.price-ttl-seconds=30
# API response marks stale:true if age exceeds this threshold
redis.cache.staleness-threshold-seconds=10

# ── Market Hours (IST) ────────────────────────────────────────────────────────
market.open-cron=0 15 9 * * MON-FRI
market.close-cron=0 30 15 * * MON-FRI
market.timezone=Asia/Kolkata

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.tradesphere.market=DEBUG
logging.level.okhttp3=INFO
