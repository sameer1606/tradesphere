# ─────────────────────────────────────────────────────────────────────────────
# TradeSphere — Notification Service
# Port: 8086 | DB: MongoDB (notification logs)
# Simplest service — purely reactive, no outbound calls, no Postgres, no Feign
# ─────────────────────────────────────────────────────────────────────────────

server.port=8086
spring.application.name=tradesphere-notification-service

# ── MongoDB ───────────────────────────────────────────────────────────────────
spring.data.mongodb.uri=${MONGODB_URI:mongodb://tradesphere:tradesphere@localhost:27017/tradesphere_notifications?authSource=admin}

# ── Kafka Consumer ────────────────────────────────────────────────────────────
# Consumes all 3 order lifecycle events (separate consumer group from account/portfolio)
# order.executed  → push "Executed at ₹X" to Angular
# order.cancelled → push "Order cancelled" to Angular
# order.rejected  → push "Rejected: {reason}" to Angular
spring.kafka.bootstrap-servers=${KAFKA_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=tradesphere-notification-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.tradesphere.*

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:tradesphere-local-dev-secret-replace-before-any-real-use}

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.tradesphere.notification=DEBUG
